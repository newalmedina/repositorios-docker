services:
  app:
    container_name: ${PROYECT_NAME}-app
    build:
      context: .
      dockerfile: Dockerfile-php-fpm
    ports:
      - "${APACHE_PORT}:80"   # Nginx escuchará aquí
    volumes:
      - "${DOCUMENT_ROOT}:/var/www/html"
      - "${PHP_INI}:/usr/local/etc/php/php.ini"
      - "./default.conf:/etc/nginx/conf.d/default.conf"
      - "${APACHE_LOG_DIR}:/var/log/nginx"
    networks:
      - web
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  web:
    external: true
