services:
  php-fpm-apache:
    container_name: ${PROYECT_NAME}-php
    build:
      context: .
    ports:
      - "${APACHE_PORT}:80"
    volumes:
      # Código de la app
      - "${DOCUMENT_ROOT}:/var/www/html:cached"
      # Configuración PHP
      - "${PHP_INI}:/usr/local/etc/php/php.ini:cached"
      # Configuración Apache
      - "${CONFIG_FILE}:/etc/apache2/sites-available/000-default.conf:cached"
      # Logs de Apache
      - "${APACHE_LOG_DIR}:/var/log/apache2"
    environment:
      TZ: Europe/Madrid
    networks:
      - web
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost/"]
      interval: 1m
      timeout: 10s
      retries: 3
      start_period: 30s

networks:
  web:
    external: true
